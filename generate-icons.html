<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成图标</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; background: #f5f6fa; }
    button { padding: 14px 36px; font-size: 18px; background: #4f6ef7; color: #fff; border: none;
      border-radius: 8px; cursor: pointer; margin: 10px; }
    button:hover { background: #3b5de7; }
    canvas { display: none; }
    .preview { display: flex; justify-content: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; }
    .preview div { text-align: center; }
    .preview img { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <h1>📒 学生记账本 - 图标生成器</h1>
  <p>点击按钮自动生成并下载所有尺寸的图标</p>
  <div class="preview" id="preview"></div>
  <button onclick="generateAll()">🎨 生成全部图标</button>
  <canvas id="c"></canvas>
  <script>
    function drawIcon(size) {
      const c = document.getElementById('c');
      c.width = size;
      c.height = size;
      const ctx = c.getContext('2d');
      const m = size / 10;
      const cx = size / 2, cy = size / 2;
      const s = size / 3;

      // 蓝色圆形背景
      ctx.fillStyle = '#4f6ef7';
      ctx.beginPath();
      ctx.arc(cx, cy, size/2 - m, 0, Math.PI*2);
      ctx.fill();

      // 白色账本
      const rw = s * 1.3, rh = s * 1.5;
      const x0 = cx - rw/2, y0 = cy - rh/2 + s*0.1;
      const x1 = cx + rw/2, y1 = cy + rh/2 + s*0.1;
      const rad = size / 16;
      ctx.fillStyle = 'rgba(255,255,255,0.94)';
      ctx.beginPath();
      ctx.roundRect(x0, y0, rw, rh, rad);
      ctx.fill();

      // 书脊中线
      ctx.strokeStyle = '#4f6ef7';
      ctx.lineWidth = Math.max(2, size/55);
      ctx.beginPath();
      ctx.moveTo(cx, y0 + rad);
      ctx.lineTo(cx, y1 - rad);
      ctx.stroke();

      // 横线（模拟文字行）
      const lw = rw / 3;
      ctx.fillStyle = 'rgba(79,110,247,0.4)';
      for (let i = 0; i < 4; i++) {
        const lx = cx - lw/2;
        const ly = y0 + rad + s*0.25 + i * s*0.28;
        ctx.beginPath();
        ctx.roundRect(lx, ly, lw, Math.max(2, size/50), Math.max(1, size/100));
        ctx.fill();
      }

      // 金币
      const cr = s * 0.35;
      const ccx = cx, ccy = cy - s*1.05;

      // 金币外圈
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(ccx, ccy, cr, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#c8a000';
      ctx.lineWidth = Math.max(2, size/80);
      ctx.stroke();

      // ¥ 符号
      ctx.fillStyle = '#8B7500';
      ctx.font = `bold ${cr*1.2}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('¥', ccx, ccy + 1);

      return c.toDataURL('image/png');
    }

    function download(dataUrl, filename) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename;
      a.click();
    }

    function generateAll() {
      const sizes = [
        { size: 192, name: 'icon-192.png' },
        { size: 512, name: 'icon-512.png' },
        { size: 180, name: 'apple-touch-icon.png' },
      ];
      sizes.forEach(s => {
        const url = drawIcon(s.size);
        download(url, s.name);
        // 预览
        const div = document.getElementById('preview');
        const img = document.createElement('img');
        img.src = url;
        img.width = 100;
        img.height = 100;
        const wrap = document.createElement('div');
        wrap.innerHTML = `<p>${s.name}<br>${s.size}x${s.size}</p>`;
        wrap.prepend(img);
        div.appendChild(wrap);
      });
      setTimeout(() => alert('✅ 图标已生成并下载！\n\n请将下载的 3 个 PNG 文件放到 money 文件夹中。'), 500);
    }
  </script>
</body>
</html>
