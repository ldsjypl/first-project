<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f6ef7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- 白色账本 -->
  <rect x="142" y="168" rx="30" ry="30" width="228" height="256" fill="rgba(255,255,255,0.94)"/>
  <!-- 书脊线 -->
  <line x1="256" y1="198" x2="256" y2="394" stroke="#4f6ef7" stroke-width="8" stroke-linecap="round"/>
  <!-- 横线 -->
  <rect x="180" y="220" rx="4" width="60" height="8" fill="rgba(79,110,247,0.4)"/>
  <rect x="180" y="248" rx="4" width="80" height="8" fill="rgba(79,110,247,0.4)"/>
  <rect x="180" y="276" rx="4" width="50" height="8" fill="rgba(79,110,247,0.4)"/>
  <rect x="180" y="304" rx="4" width="70" height="8" fill="rgba(79,110,247,0.4)"/>
  <rect x="180" y="332" rx="4" width="55" height="8" fill="rgba(79,110,247,0.4)"/>
  <!-- 金币外圈 -->
  <circle cx="256" cy="108" r="52" fill="#ffd700" stroke="#c8a000" stroke-width="6"/>
  <!-- 金币 ¥ -->
  <text x="256" y="120" text-anchor="middle" font-size="44" font-weight="bold" font-family="sans-serif" fill="#8B7500">¥</text>
</svg>
